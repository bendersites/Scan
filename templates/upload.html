<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenderSites Scanner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e2e8f0; padding: 2rem; }
.container { background: #1e293b; border-radius: 20px; padding: 3rem; max-width: 600px; width: 100%; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
.logo { text-align: center; margin-bottom: 2rem; }
.logo h1 { font-size: 2rem; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
.logo p { color: #94a3b8; font-size: 0.95rem; }
.drop-zone { border: 2px dashed #475569; border-radius: 16px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.3s; background: #0f172a; margin-bottom: 1.5rem; }
.drop-zone:hover, .drop-zone.dragover { border-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
.drop-zone svg { width: 48px; height: 48px; margin-bottom: 1rem; color: #64748b; }
.drop-zone p { color: #94a3b8; font-size: 0.95rem; }
.drop-zone .highlight { color: #f59e0b; font-weight: 600; }
.file-input { display: none; }
.btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
.btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,158,11,0.3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.progress { display: none; margin-top: 1.5rem; }
.progress-bar { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; margin-bottom: 0.75rem; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #ef4444); border-radius: 4px; transition: width 0.5s ease; width: 0%; }
.progress-info { display: flex; justify-content: space-between; color: #94a3b8; font-size: 0.85rem; }
.progress-info .current { color: #f59e0b; font-weight: 600; }
.result { display: none; margin-top: 1.5rem; padding: 1.5rem; background: #064e3b; border-radius: 12px; border: 1px solid #10b981; text-align: center; }
.result h3 { color: #6ee7b7; margin-bottom: 0.5rem; }
.result a { display: inline-block; margin-top: 0.75rem; padding: 0.75rem 1.5rem; background: #10b981; color: #064e3b; text-decoration: none; border-radius: 8px; font-weight: 700; margin-right: 0.5rem; margin-bottom: 0.5rem; }
.result a.secondary { background: transparent; color: #6ee7b7; border: 1px solid #10b981; }
</style>
</head>
<body>
<div class="container">
    <div class="logo"><h1>🔍 BenderSites</h1><p>Website-Scanner für Cold-Calling Leads</p></div>
    <div class="drop-zone" id="dropZone">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
        <p>CSV hier reinziehen oder <span class="highlight">klicken zum Auswählen</span></p>
        <p style="font-size: 0.8rem; margin-top: 0.5rem; color: #64748b;">Spalte muss "Website" heißen</p>
    </div>
    <input type="file" class="file-input" id="fileInput" accept=".csv">
    <button class="btn" id="scanBtn" disabled>🚀 Scan starten</button>

    <div style="margin-top:2rem;padding-top:2rem;border-top:1px solid #334155;">
        <p style="color:#94a3b8;font-size:0.9rem;margin-bottom:0.75rem;">Einzelne Website checken</p>
        <div style="display:flex;gap:0.75rem;">
            <input type="text" id="singleUrl" placeholder="https://beispiel.de" style="flex:1;padding:0.75rem 1rem;background:#0f172a;border:1px solid #475569;border-radius:10px;color:#e2e8f0;font-size:0.95rem;outline:none;" />
            <button id="singleBtn" onclick="checkSingle()" style="padding:0.75rem 1.25rem;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0f172a;border:none;border-radius:10px;font-weight:700;cursor:pointer;white-space:nowrap;">Checken</button>
        </div>
        <div id="singleResult" style="display:none;margin-top:1rem;padding:1.25rem;background:#0f172a;border-radius:12px;border:1px solid #334155;font-size:0.875rem;"></div>
    </div>
    <div class="progress" id="progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-info"><span class="current" id="currentUrl">Warte auf Start...</span><span id="progressText">0 / 0</span></div>
    </div>
    <div class="result" id="result">
        <h3>✅ Scan abgeschlossen!</h3>
        <p id="summaryText"></p>
        <div><a href="/report" target="_blank">📄 Report öffnen</a><a href="/download-csv" class="secondary">📥 CSV download</a></div>
    </div>
</div>
<script>
const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('fileInput'), scanBtn = document.getElementById('scanBtn');
const progress = document.getElementById('progress'), progressFill = document.getElementById('progressFill'), currentUrl = document.getElementById('currentUrl');
const progressText = document.getElementById('progressText'), result = document.getElementById('result'), summaryText = document.getElementById('summaryText');
let selectedFile = null;
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files.length){selectedFile=e.dataTransfer.files[0]; dropZone.innerHTML=`<p style="color:#f59e0b;font-weight:600;">📄 ${selectedFile.name}</p>`; scanBtn.disabled=false;} });
fileInput.addEventListener('change', () => { if(fileInput.files.length){selectedFile=fileInput.files[0]; dropZone.innerHTML=`<p style="color:#f59e0b;font-weight:600;">📄 ${selectedFile.name}</p>`; scanBtn.disabled=false;} });
async function checkSingle() {
    const url = document.getElementById('singleUrl').value.trim();
    if (!url) return;
    const btn = document.getElementById('singleBtn');
    const box = document.getElementById('singleResult');
    btn.disabled = true;
    btn.textContent = '...';
    box.style.display = 'block';
    box.innerHTML = '<span style="color:#94a3b8">Scanne...</span>';
    try {
        const r = await fetch('/scan-single', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({url})});
        const d = await r.json();
        const scoreColor = d.visual_score < 20 ? '#fca5a5' : d.visual_score < 40 ? '#fdba74' : d.visual_score < 65 ? '#fde047' : '#6ee7b7';
        const details = d.visual_details.map(x => `<div style="padding:2px 0">${x}</div>`).join('');
        const opps = d.opportunities.length ? `<div style="margin-top:0.75rem;padding:0.75rem;background:#1e3a5f;border-radius:8px;border-left:3px solid #3b82f6"><div style="color:#93c5fd;font-size:0.8rem;margin-bottom:0.4rem">Verkaufsargumente</div>${d.opportunities.map(o=>`<div style="color:#bfdbfe;font-size:0.8rem">💡 ${o}</div>`).join('')}</div>` : '';
        box.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
                <a href="${d.url}" target="_blank" style="color:#60a5fa;font-size:0.8rem">${d.url}</a>
                <span style="font-size:1.5rem;font-weight:700;color:${scoreColor}">${d.visual_score}</span>
            </div>
            <div style="color:${scoreColor};font-weight:600;margin-bottom:0.75rem">${d.visual_era}</div>
            <div style="color:#94a3b8;font-size:0.8rem;margin-bottom:0.5rem">📧 ${d.mail||'–'} &nbsp; 📞 ${d.telefon||'–'} &nbsp; ⏱️ ${d.load_time}s &nbsp; 📅 ${d.domain_age||'?'}</div>
            ${details}${opps}`;
    } catch(e) {
        box.innerHTML = '<span style="color:#fca5a5">Fehler beim Scannen</span>';
    }
    btn.disabled = false;
    btn.textContent = 'Checken';
}

scanBtn.addEventListener('click', async () => { if(!selectedFile)return; scanBtn.disabled=true; progress.style.display='block'; const fd=new FormData(); fd.append('file',selectedFile); await fetch('/upload',{method:'POST',body:fd}); const iv=setInterval(async()=>{const d=await(await fetch('/status')).json(); progressFill.style.width=d.percent+'%'; currentUrl.textContent=d.url||'Scanne...'; progressText.textContent=`${d.current} / ${d.total}`; if(!d.running&&d.current>0){clearInterval(iv); progress.style.display='none'; result.style.display='block'; summaryText.textContent=`${d.total} Websites analysiert. Filter im Report auf 🔴 ALT für deine heißen Leads.`; scanBtn.textContent='✅ Fertig';
// Auto-Download CSV
const a=document.createElement('a'); a.href='/download-csv'; a.download='bender-sites-scan.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}},1000); });
</script>
</body>
</html>
